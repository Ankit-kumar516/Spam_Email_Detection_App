<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector</title>
    <style>
        :root {
            --bg-1: #f4efe6;
            --bg-2: #dce7f5;
            --card-bg: rgba(255, 255, 255, 0.78);
            --card-border: rgba(26, 34, 56, 0.12);
            --heading: #1a2238;
            --text: #303a52;
            --accent: #eb5e28;
            --accent-hover: #cf4e1c;
            --accent-2: #2576b8;
            --ok: #1c7c54;
            --bad: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(235, 94, 40, 0.22), transparent 38%),
                radial-gradient(circle at 90% 85%, rgba(26, 34, 56, 0.2), transparent 40%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
        }

        .container {
            position: relative;
            isolation: isolate;
            width: min(920px, 100%);
            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                linear-gradient(135deg, rgba(235, 94, 40, 0.72), rgba(37, 118, 184, 0.65), rgba(28, 124, 84, 0.62)) border-box;
            border: 2px solid transparent;
            border-radius: 26px;
            padding: 38px;
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 40px rgba(15, 24, 48, 0.18);
            animation: floatIn 0.55s ease-out;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 20px;
            border: 1px dashed rgba(26, 34, 56, 0.2);
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            margin: 0;
            color: var(--heading);
            font-size: clamp(1.7rem, 4vw, 2.3rem);
            letter-spacing: 0.4px;
            text-align: center;
        }

        .subtitle {
            margin: 10px 0 24px;
            text-align: center;
            font-size: 0.98rem;
            opacity: 0.92;
        }

        form {
            display: grid;
            gap: 14px;
        }

        textarea {
            width: 100%;
            min-height: 185px;
            resize: vertical;
            border-radius: 16px;
            border: 1.5px solid rgba(26, 34, 56, 0.24);
            padding: 16px 18px;
            font-size: 1.04rem;
            line-height: 1.5;
            color: var(--text);
            background: rgba(255, 255, 255, 0.9);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(235, 94, 40, 0.17);
        }

        button {
            justify-self: center;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff;
            font-size: 1.04rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            padding: 13px 32px;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.78;
        }

        .result {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(26, 34, 56, 0.13);
        }

        .result.spam {
            color: var(--bad);
            background: rgba(180, 35, 24, 0.08);
            border-color: rgba(180, 35, 24, 0.22);
        }

        .result.safe {
            color: var(--ok);
            background: rgba(28, 124, 84, 0.1);
            border-color: rgba(28, 124, 84, 0.24);
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 16px;
                border-radius: 20px;
            }

            textarea {
                min-height: 145px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Spam Detection App</h1>
        <p class="subtitle">Message paste karo, aur model se instant spam check pao.</p>

        <form id="spamForm" method="POST" action="/predict">
            <input id="messageHidden" type="hidden" name="message">
            <textarea id="messageBox" placeholder="Type or paste your message here..."></textarea>
            <button type="submit">Check Message</button>
        </form>

        {% if prediction %}
        <div class="result {% if 'Spam' in prediction %}spam{% else %}safe{% endif %}">
            Result: {{ prediction }}
        </div>
        {% endif %}
    </main>

    <script>
        const form = document.getElementById("spamForm");
        const messageBox = document.getElementById("messageBox");
        const messageHidden = document.getElementById("messageHidden");
        const submitBtn = form.querySelector("button[type='submit']");

        form.addEventListener("submit", function (event) {
            const value = messageBox.value.trim();
            if (!value) {
                event.preventDefault();
                messageBox.focus();
                return;
            }

            messageHidden.value = value;
            messageBox.value = "";
            submitBtn.disabled = true;
            submitBtn.textContent = "Checking...";
        });
    </script>
</body>
</html>
